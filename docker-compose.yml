services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  discord-bot:
    build: .
    command: python examples/discord_demo/bot.py
    env_file: .env
    depends_on:
      - qdrant
    restart: on-failure
    profiles:
      - discord

  telegram-bot:
    build: .
    command: python examples/telegram_demo/bot.py
    env_file: .env
    depends_on:
      - qdrant
    restart: on-failure
    profiles:
      - telegram

volumes:
  qdrant_storage:
